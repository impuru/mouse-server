<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Remote Mouse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{
    --bg: #14161a;
    --panel: #1d2026;
    --panel-2: #23262e;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.18);
    --text: #e8eaf0;
    --text-dim: #8a8f9c;
    --ok: #3ddc84;
    --bad: #ff5d5d;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body{
    margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior:none; touch-action:none;
  }
  .app{
    height:100dvh; display:flex; flex-direction:column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 18px; flex-shrink:0;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-dot{ width:8px; height:8px; border-radius:50%; background:var(--bad); transition: background .2s; }
  .brand-dot.connected{ background: var(--ok); box-shadow:0 0 8px var(--ok); }
  .brand-title{ font-size:15px; font-weight:600; letter-spacing:0.2px; }
  .brand-sub{ font-size:12px; color:var(--text-dim); }
  .gear{
    width:34px; height:34px; border-radius:10px; background:var(--panel-2);
    display:flex; align-items:center; justify-content:center; color:var(--text-dim);
    font-size:16px; border:1px solid #2c303a;
  }

  .pad{
    flex:1; margin: 0 16px; border-radius:20px;
    background: radial-gradient(circle at 30% 20%, #262a33, var(--panel) 70%);
    border:1px solid #2a2e38;
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .pad-hint{
    color:var(--text-dim); font-size:13px; text-align:center; line-height:1.6;
    pointer-events:none; opacity:0.7; padding: 0 30px;
  }
  .pad-hint b{ color:var(--text); font-weight:600; }
  .ripple{
    position:absolute; width:14px; height:14px; border-radius:50%;
    background:var(--accent-soft); border:1px solid var(--accent);
    transform:translate(-50%,-50%); pointer-events:none; opacity:0;
  }

  .controls{
    display:flex; gap:10px; padding: 14px 16px; flex-shrink:0;
  }
  .btn{
    flex:1; height:56px; border-radius:16px; background:var(--panel-2);
    border:1px solid #2c303a; color:var(--text); font-size:15px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{ background:var(--accent-soft); border-color:var(--accent); }
  .scrollbar{
    width:56px; flex:none; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; color:var(--text-dim); font-size:11px;
  }

  .sheet{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none;
    align-items:flex-end; justify-content:center; z-index:10;
  }
  .sheet.open{ display:flex; }
  .sheet-inner{
    width:100%; max-width:480px; background:var(--panel); border-radius:20px 20px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .sheet-title{ font-size:16px; font-weight:600; }
  .field-label{ font-size:13px; color:var(--text-dim); margin-bottom:8px; }
  input[type=range]{ width:100%; accent-color: var(--accent); }
  input[type=text]{
    width:100%; background:var(--panel-2); border:1px solid #2c303a; border-radius:10px;
    padding:12px; color:var(--text); font-size:15px;
  }
  .close-sheet{ color:var(--accent); font-size:15px; font-weight:600; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-dot" id="dot"></div>
      <div>
        <div class="brand-title">Remote Mouse</div>
        <div class="brand-sub" id="statusText">connecting…</div>
      </div>
    </div>
    <div class="gear" id="settingsBtn">⚙</div>
  </header>

  <div class="pad" id="pad">
    <div class="pad-hint" id="hint">
      <b>Drag</b> to move &nbsp;·&nbsp; <b>Tap</b> to click<br>
      <b>Two-finger drag</b> to scroll &nbsp;·&nbsp; <b>Two-finger tap</b> for right-click<br>
      <b>Press &amp; hold</b> then drag to select
    </div>
  </div>

  <div class="controls">
    <div class="btn" id="leftBtn">Left</div>
    <div class="btn" id="rightBtn">Right</div>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="sheet-row">
      <div class="sheet-title">Settings</div>
      <div class="close-sheet" id="closeSheet">Done</div>
    </div>
    <div class="field-label">Server address</div>
    <input type="text" id="serverInput" placeholder="http://192.168.1.10:5000">
    <div style="height:18px"></div>
    <div class="field-label">Sensitivity: <span id="sensVal">2.0</span>×</div>
    <input type="range" id="sensSlider" min="0.5" max="5" step="0.1" value="2">
  </div>
</div>

<script>
  const pad = document.getElementById('pad');
  const hint = document.getElementById('hint');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const sheet = document.getElementById('sheet');
  const serverInput = document.getElementById('serverInput');
  const sensSlider = document.getElementById('sensSlider');
  const sensVal = document.getElementById('sensVal');

  let sensitivity = parseFloat(localStorage.getItem('sensitivity') || '2.0');
  sensSlider.value = sensitivity;
  sensVal.textContent = sensitivity.toFixed(1);

  let serverUrl = localStorage.getItem('serverUrl') || window.location.origin;
  serverInput.value = serverUrl;

  let socket = io(serverUrl, { transports: ['websocket', 'polling'] });

  function connectTo(url){
    try { socket.disconnect(); } catch(e){}
    socket = io(url, { transports: ['websocket', 'polling'] });
    bindSocket();
  }

  function bindSocket(){
    socket.on('connect', () => {
      dot.classList.add('connected');
      statusText.textContent = 'connected';
    });
    socket.on('disconnect', () => {
      dot.classList.remove('connected');
      statusText.textContent = 'disconnected';
    });
    socket.on('connect_error', () => {
      dot.classList.remove('connected');
      statusText.textContent = 'cannot reach server';
    });
  }
  bindSocket();

  document.getElementById('settingsBtn').onclick = () => sheet.classList.add('open');
  document.getElementById('closeSheet').onclick = () => {
    sheet.classList.remove('open');
    const newUrl = serverInput.value.trim();
    if (newUrl && newUrl !== serverUrl){
      serverUrl = newUrl;
      localStorage.setItem('serverUrl', serverUrl);
      connectTo(serverUrl);
    }
  };
  sensSlider.oninput = () => {
    sensitivity = parseFloat(sensSlider.value);
    sensVal.textContent = sensitivity.toFixed(1);
    localStorage.setItem('sensitivity', sensitivity);
  };

  // ---- Touch handling ----
  let touchState = null;
  let holdTimer = null;
  let dragging = false;
  const TAP_MOVE_THRESHOLD = 8;
  const HOLD_MS = 350;

  function fadeHint(){
    if (hint) { hint.style.transition = 'opacity .4s'; hint.style.opacity = '0'; }
  }

  pad.addEventListener('touchstart', (e) => {
    fadeHint();
    const touches = e.touches;
    touchState = {
      count: touches.length,
      startX: touches[0].clientX,
      startY: touches[0].clientY,
      lastX: touches[0].clientX,
      lastY: touches[0].clientY,
      startTime: Date.now(),
      moved: false,
      lastTwo: touches.length === 2 ? [touches[0].clientY, touches[1].clientY] : null
    };
    clearTimeout(holdTimer);
    if (touches.length === 1){
      holdTimer = setTimeout(() => {
        if (touchState && !touchState.moved){
          dragging = true;
          socket.emit('mouse_down', { button: 'left' });
          if (navigator.vibrate) navigator.vibrate(15);
        }
      }, HOLD_MS);
    }
  }, { passive: true });

  pad.addEventListener('touchmove', (e) => {
    if (!touchState) return;
    const touches = e.touches;

    if (touches.length === 1){
      const x = touches[0].clientX, y = touches[0].clientY;
      const dx = x - touchState.lastX;
      const dy = y - touchState.lastY;
      if (Math.abs(x - touchState.startX) > TAP_MOVE_THRESHOLD || Math.abs(y - touchState.startY) > TAP_MOVE_THRESHOLD){
        touchState.moved = true;
        clearTimeout(holdTimer);
      }
      socket.emit('move', { dx: dx * sensitivity, dy: dy * sensitivity });
      touchState.lastX = x;
      touchState.lastY = y;
    } else if (touches.length === 2){
      clearTimeout(holdTimer);
      const avgY = (touches[0].clientY + touches[1].clientY) / 2;
      const prevAvgY = touchState.lastTwo
        ? (touchState.lastTwo[0] + touchState.lastTwo[1]) / 2
        : avgY;
      const dy = avgY - prevAvgY;
      if (Math.abs(dy) > 0.5){
        socket.emit('scroll', { dx: 0, dy: dy * 0.08 });
        touchState.moved = true;
      }
      touchState.lastTwo = [touches[0].clientY, touches[1].clientY];
    }
  }, { passive: true });

  pad.addEventListener('touchend', (e) => {
    clearTimeout(holdTimer);
    if (!touchState) return;
    const elapsed = Date.now() - touchState.startTime;

    if (dragging){
      socket.emit('mouse_up', { button: 'left' });
      dragging = false;
    } else if (!touchState.moved && elapsed < 400) {
      if (touchState.count === 2){
        socket.emit('click', { button: 'right' });
      } else {
        socket.emit('click', { button: 'left' });
      }
    }
    touchState = null;
  }, { passive: true });

  pad.addEventListener('touchcancel', () => {
    clearTimeout(holdTimer);
    if (dragging){ socket.emit('mouse_up', { button: 'left' }); dragging = false; }
    touchState = null;
  }, { passive: true });

  // ---- Bottom buttons ----
  document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    socket.emit('click', { button: 'left' });
  });
  document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    socket.emit('click', { button: 'right' });
  });

  // Prevent page scroll/zoom gestures
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('touchmove', (e) => {
    if (e.target === pad || e.target.closest('.pad')) e.preventDefault();
  }, { passive: false });
</script>
</body>
</html>
